version: '3.0'

services:
  main:
    container_name: main
    build:
      context: .
    env_file:
      - .development.env
    volumes:
      # Монтируем код для разработки (горячая перезагрузка)
      - .:/project-name
      # НЕ монтируем node_modules из хост-системы
      - /project-name/node_modules
    ports:
      - "5000:5000"
      - "9229:9229"
    # Исправляем command - используем массив с раздельными элементами
    command: ["npm", "run", "start:dev"]
    depends_on:
      - postgres
    restart: always

  postgres:
    container_name: postgres
    image: postgres:12
    env_file:
      - .development.env
    environment:
      PG_DATA: /var/lib/postgresql/data
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata: